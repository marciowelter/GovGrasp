services:
  # ---------------------------------------------
  # Database (Simulates Amazon RDS)
  # ---------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: govgrasp_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-govgrasp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - govgrasp_network

  # ---------------------------------------------
  # Backend API (Laravel)
  # ---------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: govgrasp_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-govgrasp}
      - DB_USERNAME=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - WORKER_URL=http://worker:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - govgrasp_network
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  # ---------------------------------------------
  # Ollama — Local LLM Server (serves LLaMA 3.1 8B)
  # Memory requirement: ≤ 8 GB RAM (model: 4.9 GB)
  # ---------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: govgrasp_ollama
    restart: unless-stopped
    ports:
      - "11435:11434" # host:11435 → container:11434 (avoids conflict if Ollama runs on host)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - govgrasp_network
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # One-shot: pulls llama3.1:8b into the shared volume (skipped if already cached)
  ollama-init:
    image: ollama/ollama:latest
    container_name: govgrasp_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - govgrasp_network
    restart: "no"
    entrypoint: [ "ollama", "pull", "llama3.2:1b" ]

  # ---------------------------------------------
  # Worker AI (Python + Ollama / LLaMA 3.1 8B)
  # ---------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: govgrasp_worker
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_DATABASE:-govgrasp}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:1b}
      - S3_BUCKET_DATA=${S3_BUCKET_DATA:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-2}
      - SCHEDULE_HOURS=${SCHEDULE_HOURS:-12}
      - AUTO_RUN_ON_STARTUP=${AUTO_RUN_ON_STARTUP:-false}
      - COMMIT_EVERY_N=${COMMIT_EVERY_N:-25}
    volumes:
      - ./worker:/app
    depends_on:
      db:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    networks:
      - govgrasp_network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # ---------------------------------------------
  # Frontend React (local dev server)
  # ---------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: govgrasp_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
    networks:
      - govgrasp_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  ollama_data:

networks:
  govgrasp_network:
    driver: bridge
